name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'pnpm'

      - uses: pnpm/action-setup@v3
        with:
          version: latest
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Release
        run: pnpm release
